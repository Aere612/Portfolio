<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f0f0f;
    color: #fff;
}

/* HEADER */
.header {
    text-align: center;
    padding: 60px 20px 30px;
}

.profile-img {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    object-fit: cover;
    margin-bottom: 15px;
    border: 3px solid #333;
}

.name {
    font-size: 2rem;
    margin-bottom: 5px;
}

.title {
    color: #aaa;
}

.catchy {
    margin-top: 20px;
    font-size: 1.2rem;
    color: #ccc;
}

/* PROJECT SECTION */
.projects {
    max-width: 1000px;
    margin: auto;
    padding: 20px;
}

/* PROJECT CARD */
.project {
    margin-bottom: 80px;
    border-bottom: 1px solid #222;
    padding-bottom: 40px;
}

.project-title {
    font-size: 1.5rem;
    margin-bottom: 10px;
}

.project-meta {
    color: #aaa;
    margin-bottom: 15px;
}

/* MEDIA AREA */
.media {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
}

/* IMAGES */
.media img {
    max-width: 100%;
    border-radius: 10px;
    transition: 0.3s;
}

.media img:hover {
    transform: scale(1.03);
}

/* VIDEOS */
.media video {
    width: 100%;
    max-width: 500px;
    border-radius: 10px;
}

/* LINK BUTTON */
.store-link {
    display: inline-block;
    margin-top: 15px;
    padding: 10px 20px;
    background: #2a2a2a;
    border-radius: 8px;
    text-decoration: none;
    color: white;
    transition: 0.3s;
}

.store-link:hover {
    background: #444;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <img src="Assets/Me.jpg" class="profile-img">
    <div class="name">Ali Eren Aydın</div>
    <div class="title">Game Developer • Unity</div>
    <div class="catchy">Check out my projects 👇</div>
</div>

<!-- PROJECTS -->
<div class="projects">

    <div class="project">
        <div class="project-title">Triple Puzzle Match Object 3D</div>
        <div class="project-meta">Match-3 3D • Unity • C#</div>

        <div class="media">
            <img src="Assets/Triple Puzzle Match Object 3D/screen-0.jpg">
            <img src="Assets/Triple Puzzle Match Object 3D/screen-1.jpg">
            <img src="Assets/Triple Puzzle Match Object 3D/screen-2.jpg">
            <img src="Assets/Triple Puzzle Match Object 3D/screen-3.jpg">
            <img src="Assets/Triple Puzzle Match Object 3D/screen-4.jpg">
            <img src="Assets/Triple Puzzle Match Object 3D/screen-5.jpg">
            <img src="Assets/Triple Puzzle Match Object 3D/screen-6.jpg">
            <img src="Assets/Triple Puzzle Match Object 3D/screen-7.jpg">
            
            <!-- OPTIONAL VIDEO -->
            <video controls>
                <source src="Assets/Triple Puzzle Match Object 3D/!!!!!!" type="video/mp4">
            </video>
        </div>

        <a href="https://apkpure.com/match-tile-3d-puzzle-master/richie.match.tile.puzzle" target="_blank" class="store-link">
            View on Store
        </a>
    </div>

    <div class="project">
        <div class="project-title">Triple Match - 3 Tile Master</div>

        <div class="media">

            <img src="Assets/Triple Match - 3 Tile Master/screen-5.jpg">
            <img src="Assets/Triple Match - 3 Tile Master/screen-6.jpg">
            <img src="Assets/Triple Match - 3 Tile Master/screen-7.jpg">
            
            <!-- OPTIONAL VIDEO -->
            <video controls>
                <source src="Assets/Triple Match - 3 Tile Master/Triple Match - 3 Tile Master.mp4" type="video/mp4">
            </video>
        </div>

        <a href="https://apkpure.com/triple-match-3-tile-master/richie.triple.match.tile.master.zen.puzzle" target="_blank" class="store-link">

</body>
</html>
